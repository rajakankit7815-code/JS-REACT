<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    margin: 0;
  }
  canvas {
    background: #000;
    border: 2px solid #0f0;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="400"></canvas>

<script src>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
let snake = [{ x: 200, y: 200 }];
let food = {
  x: Math.floor(Math.random() * 20) * box,
  y: Math.floor(Math.random() * 20) * box
};

let direction = "RIGHT";
let score = 0;

// Controls
document.addEventListener("keydown", changeDirection);

function changeDirection(event) {
  if (event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  else if (event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  else if (event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  else if (event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
}

// Collision check
function collision(head, array) {
  for (let i = 0; i < array.length; i++) {
    if (head.x === array[i].x && head.y === array[i].y) return true;
  }
  return false;
}

// Game loop
function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 400, 400);

  // Draw snake
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "#0f0" : "#0a0";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // Draw food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  // Move snake
  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= box;
  if (direction === "UP") headY -= box;
  if (direction === "RIGHT") headX += box;
  if (direction === "DOWN") headY += box;

  // Eat food
  if (headX === food.x && headY === food.y) {
    score++;
    food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };
  } else {
    snake.pop();
  }

  const newHead = { x: headX, y: headY };

  // Game over conditions
  if (
    headX < 0 || headY < 0 ||
    headX >= canvas.width || headY >= canvas.height ||
    collision(newHead, snake)
  ) {
    clearInterval(game);
    alert("Game Over! Score: " + score);
  }

  snake.unshift(newHead);

  // Score display
  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 20);
}

const game = setInterval(draw, 100);
</script>

</body>
</html> -->

</div>

<script>
const gameArea = document.getElementById("gameArea");
const player = document.getElementById("player");
const scoreDisplay = document.getElementById("score");

let keys = {};
let speed = 5;
let score = 0;

player.style.left = "175px";

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Create road lines
for(let i=0;i<5;i++){
    let line = document.createElement("div");
    line.classList.add("line");
    line.style.top = (i*150) + "px";
    gameArea.appendChild(line);
}

// Create enemies
function createEnemy(){
    let enemy = document.createElement("div");
    enemy.classList.add("enemy");
    enemy.style.top = "-100px";
    enemy.style.left = Math.floor(Math.random()*350) + "px";
    gameArea.appendChild(enemy);
}

setInterval(createEnemy, 1500);

// Collision detection
function isCollide(a, b){
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();

    return !(
        aRect.bottom < bRect.top ||
        aRect.top > bRect.bottom ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right
    );
}

// Game loop
function gameLoop(){
    let playerLeft = player.offsetLeft;

    // Move player
    if(keys["ArrowLeft"] && playerLeft > 0){
        player.style.left = playerLeft - speed + "px";
    }
    if(keys["ArrowRight"] && playerLeft < 350){
        player.style.left = playerLeft + speed + "px";
    }

    // Move lines
    document.querySelectorAll(".line").forEach(line => {
        let top = line.offsetTop;
        if(top > window.innerHeight){
            top = -100;
        }
        line.style.top = top + speed + "px";
    });

    // Move enemies
    document.querySelectorAll(".enemy").forEach(enemy => {
        let top = enemy.offsetTop;

        if(isCollide(player, enemy)){
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if(top > window.innerHeight){
            enemy.remove();
            score += 10;
            scoreDisplay.innerText = "Score: " + score;
        } else {
            enemy.style.top = top + speed + "px";
        }
    });

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
